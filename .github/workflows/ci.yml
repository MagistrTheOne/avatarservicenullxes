name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: apt deps for av/aiortc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libavdevice-dev libavfilter-dev libavformat-dev \
            libavcodec-dev libswresample-dev libswscale-dev libavutil-dev \
            libopus-dev libvpx-dev libsrtp2-dev libnss3 \
            pkg-config

      - name: pip install (stub mode)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check src tests

      - name: mypy
        run: mypy src
        continue-on-error: true  # mypy first-pass tolerance; tighten later

      - name: pytest
        env:
          ARACHNE_MODE: stub
          OPENAI_API_KEY: sk-test
          STREAM_API_KEY: test-key
          STREAM_API_SECRET: test-secret
        run: pytest -q
